# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/main.yml
#
# SPO Optimizer — Generate React Web App & Deploy to GitHub Pages
# ─────────────────────────────────────────────────────────────────────────────
#
# Triggers:
#   • Push to `main` or `claude/clever-ptolemy-t83pbr` touching relevant files
#   • Manual dispatch (Actions tab → "Run workflow")
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY   — your Anthropic API key (sk-ant-…)
#                         Only needed when force_regenerate=true or web_app/ is absent.
#
# Required GitHub Pages settings (Settings → Pages):
#   Source: "GitHub Actions"
#
# Pipeline stages:
#   1. generate  — Run agent.py to produce the React source in web_app/
#                  (skipped automatically if web_app/package.json already exists
#                   and force_regenerate != "true")
#   2. build     — npm install + npm run build
#   3. deploy    — Push dist/ to GitHub Pages
# ─────────────────────────────────────────────────────────────────────────────

name: "Generate & Deploy SPO Optimizer"

on:
  push:
    branches:
      - "main"
      - "claude/clever-ptolemy-t83pbr"
    paths:
      - "agent.py"
      - "requirements.txt"
      - "source/**"
      - "web_app/**"
      - ".github/workflows/main.yml"

  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Force full regeneration via Claude AI (requires ANTHROPIC_API_KEY secret)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write
  pages: write
  id-token: write

# ── Prevent parallel deployments ─────────────────────────────────────────────
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

# ═════════════════════════════════════════════════════════════════════════════
jobs:

  # ── JOB 1: Generate the React web app source (or reuse existing) ──────────
  generate:
    name: "🤖 Generate Web App (Claude AI)"
    runs-on: ubuntu-latest

    outputs:
      generated: ${{ steps.run-agent.outputs.generated || steps.use-existing.outputs.generated }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Decide whether to run the expensive LLM generation ────────────────
      - name: "Check if web app source already exists"
        id: check-existing
        run: |
          if [ -f "web_app/package.json" ] && [ "${{ github.event.inputs.force_regenerate }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✅  web_app/package.json found — skipping agent, using committed source."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "🤖  Running agent.py to generate web app from Claude AI..."
          fi

      # ── Path A: run agent.py (needs ANTHROPIC_API_KEY) ────────────────────
      - name: "Set up Python 3.11"
        if: steps.check-existing.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Install Python dependencies"
        if: steps.check-existing.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Run generator agent"
        id: run-agent
        if: steps.check-existing.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Starting agent.py …"
          python agent.py \
            --source source/notebook.ipynb \
            --data   source/sample_data.csv \
            --output web_app \
            --verbose
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: "Show generation log (last 60 lines)"
        if: steps.check-existing.outputs.skip != 'true'
        run: tail -60 agent.log || true

      # ── Path B: reuse committed web_app/ ──────────────────────────────────
      - name: "Use existing web app source"
        id: use-existing
        if: steps.check-existing.outputs.skip == 'true'
        run: |
          echo "Using committed web_app/ source as-is."
          echo "generated=true" >> "$GITHUB_OUTPUT"

      # ── Upload the source tree as an artifact for the build job ───────────
      - name: "Upload web app source artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "web-app-source-${{ github.run_id }}"
          path: "web_app/"
          retention-days: 7

      # ── Optionally commit regenerated source back into the repo ───────────
      - name: "Commit generated source to repository"
        if: steps.check-existing.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web_app/ agent.log || true
          if git diff --cached --quiet; then
            echo "Nothing to commit — source is unchanged."
          else
            git commit -m "chore: regenerate web app [skip ci]"
            git push
          fi

  # ── JOB 2: Build the React app with Vite ──────────────────────────────────
  build:
    name: "🏗️ Build React App"
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: "Download web app source artifact"
        uses: actions/download-artifact@v4
        with:
          name: "web-app-source-${{ github.run_id }}"
          path: "web_app/"

      - name: "Set up Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "web_app/package.json"

      - name: "Install Node dependencies"
        working-directory: web_app
        run: npm install

      - name: "Build production bundle"
        working-directory: web_app
        run: npm run build
        env:
          VITE_BASE_URL: "./"

      - name: "Show build output summary"
        working-directory: web_app
        run: |
          echo "── Build output ──────────────────────────"
          du -sh dist/
          find dist/ -type f | sort

      - name: "Configure GitHub Pages"
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: "Upload build artefact to GitHub Pages"
        uses: actions/upload-pages-artifact@v3
        with:
          path: "web_app/dist"

  # ── JOB 3: Deploy to GitHub Pages ─────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: "github-pages"
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: "Deploy"
        id: deploy
        uses: actions/deploy-pages@v4

      - name: "Print live URL"
        run: |
          echo "✅ Deployed!  ${{ steps.deploy.outputs.page_url }}"
